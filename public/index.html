<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniy Market - University Trading Platform</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .api-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        .api-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Uniy Market</h1>
        <p>University Second-Hand Trading Platform</p>
        
        <div class="status">
            <h3>🚀 Server Status: Running</h3>
            <p>The Uniy Market API server is up and running!</p>
            <p>
                <a href="/api" class="api-link">📡 API Endpoint</a> | 
                <a href="/health" class="api-link">💚 Health Check</a>
            </p>
        </div>
        
        <div class="status">
            <h3>🔧 Development Mode</h3>
            <p>This is the development server. The frontend application will be built in upcoming tasks.</p>
        </div>
    </div>
</body>
</html>
